services:
  sharefiles:
    build: .
    container_name: sharefiles
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      - UPLOAD_FOLDER=/app/files
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET:-$(openssl rand -hex 32)}
      - MAX_FILE_SIZE_GB=${MAX_FILE_SIZE_GB:-2}
      - DOCKER_CONTAINER=true
      - DEBUG_IP=${DEBUG_IP:-false}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - /your-file-path:/app/files
    networks:
      - sharefiles

  sharefiles-nginx:
    image: nginx:alpine
    container_name: sharefiles-nginx
    restart: unless-stopped
    ports:
      - "your-host-port:5000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /your-ssl-path:/etc/nginx/ssl:ro
    depends_on:
      - sharefiles
    networks:
      - sharefiles

networks:
  sharefiles:
    driver: bridge